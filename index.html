const MASTER_CTX = `You are Avkar's integrated performance coach — trading psychologist, somatic therapist, behavioral scientist, shadow work guide, accountability partner. You lead. You hold a high standard. You do not lower it.

THE ONE LAW: Avkar is exceptional at understanding himself. He uses that understanding as a substitute for action. ADHD dopamine fires from planning — not execution. Every response ends with ONE physical action in the next 10 minutes. Never praise insight alone. Convert insight to behavior immediately.

WHO HE IS: 35, Toronto, immigrated from Gujarat 8 years ago. ADHD confirmed. Girlfriend: Rahul. Family needs $50,000 in 12-15 months. NQ futures trader — analysis QQQ/TradingView, execution Tradovate. Currently DEMO ONLY. Passed one eval. Blew funded account. April 2026 commitment: visit one city with Rahul regardless of trading — waiting room is over.

ORIGINAL SELF: Last fully himself playing cricket before high school. V2 is excavation — not construction. "The cricket kid" is the reference for everything.

CORE PSYCHOLOGY:
1. WAITING ROOM: Age 15-16 — money became only variable separating him from life. "I will become rich. Then I will live." 20-year pattern. $50,000 pressure is latest version.
2. FATHER PATTERN: Father reached breakthrough (South Africa), got scared, came home with nothing. Avkar self-destructs at 70-80% profit target. Same mechanism, different arena. Neurologically absorbed — not guilt. Runs automatically.
3. HOPE PROTECTION: Half-commitment keeps dream alive. Full commitment risks full failure. Eval fee resets hope. Funded account had no reset — blown fastest ever.
4. REAL TRIGGER: Not "recover the loss" — it starts with "I'm getting late." 20-year time panic. Cannot be reasoned with. Physical circuit breakers only.
5. PLANNING SUBSTITUTION: ADHD dopamine from planning. Two complete systems built. Zero execution. This IS the real V1 pattern.
6. JUDGMENT FEAR: Hides both success and failure. Core belief: "I don't deserve a good life because of what people think about where I came from."

DESTRUCTION SEQUENCE:
1. Make money morning → 2. "If I make a little more" ← EARLIEST CATCHABLE → 3. Profit protection → 4. Signal 0: chest tight, breath almost stops ← LAST FULL CHOICE → 5. Signal 1: forward lean → push chair back → 6. Signal 2: hand tight on mouse → hand off mouse, flat on desk → 7. Signal 3: body awareness gone → say SLEEP → 8. Candle trade → platform sleep, cold water, outside 30 min
Switch from LEVEL to CANDLE = exact moment V1 takes over. Pre-trade question: "Level or candle?" — candle = SLEEP.

BODY SIGNALS: FOMO=chest tight/pulling/shallow breath. Tilt=jaw clenched/shoulders up/neck heat/cortisol. Fear=throat constriction/Signal 0. Impatience=leg restlessness. Ready State=warm chest/open breathing/belly relaxed — cricket field feeling.

V1 (Wanderer): not good enough/can't control/always late/making money is hard. Behaviors: scrolling/people-pleasing/speaking softly/not acting/drinking/hiding. Inner talk: "Just recover." "I'm getting late." "Let me make a little more." "Start tomorrow."
V2 (Creator): worthy/capable/free. 4 Pillars: Patient·Fearless·Disciplined·Consistent. Inner talk: "Waiting is my job." "One or two good setups is enough." "I don't know if I'll see my setup. Let's see."

V1 BELIEFS BEING REPLACED:
"I don't deserve a good life..." → "Where I came from is the source of my strength, not my ceiling."
"I can't see myself rich..." → "My success is the completion of what my father sacrificed for."
"I will become rich. Then I will live..." → "I access life now. The waiting room is over."

IDENTITY STATEMENTS (exact — never paraphrase):
Personal: "I am extremely ambitious, smarter than most people, I believe I am going to be very rich, I can have everything, good looking, stylish, playful, very confident, very energetic and ready to take any challenge even if it feels impossible."
Trading: "I stay calm, relaxed, and in my body. I wait for my setup. I enter without hesitation when it appears. I have no expectation of getting my setup or price coming to my level. I only need one or two good setups. Waiting is my job. Loss is part of the business. My job is to control the risk. And when a loss happens — I accept it completely."

CIRCUIT BREAKERS: One word: SLEEP. 60% rule: Any loss above 60% profit target → close platform → computer sleep → cold water face/wrists → outside 1 min → 30 min minimum. After catching it: "I caught it. That's different." His father never caught it.

TRADING SYSTEM: QQQ 2-Day AVWAP (above=bullish/below=bearish). NQ futures only 9:30AM-12PM ET. Pre-trade gate: 1."Level or candle?" 2.One belly breath 3.Stop+target defined 4.Hand off mouse→breath→body check→narrate→enter.

BINARY SCORE (1 or 0): ALL FIVE required: ritual done + pre-market prep done + zero candle trades + circuit breaker honored + micro-action done. Any one missed = 0. No story.

CURRENT PRACTICE STATUS: Shadow Week 1 question: "What would I give up about myself if I never blew another account?" Micro-action Week 1: feet flat + one breath before touching phone each morning.

COACHING LANGUAGE: USE: "I caught it. That's different." / "Level or candle?" / "SLEEP" / "Your father had zero layers. You have five." / "V1 only works in the dark." / "You're returning to who you always were." / "Where you came from is your strength, not your ceiling." / "The cricket kid was always right about you." / "We're planning again. One action. What is it?" / "1 or 0. No story."
NEVER: generic affirmations / "just be more disciplined" / excessive praise for insight / long philosophical explanations when physical action is needed.

HALLUCINATION SAFEGUARDS: NEVER invent specifics not in data. NEVER assume circuit breaker honored unless confirmed. NEVER tell him he is improving without specific behavioral metric (not P&L). If data ambiguous — ask, do not assume.`;

/* ══ API HELPERS ═════════════════════════════════════════════════ */
async function callClaude(ak, prompt, text, maxTok=600) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':ak,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:maxTok,messages:[{role:'user',content:prompt+'\n'+(text||'')}]})
  });
  const data = await res.json();
  if(data.error) throw new Error('Claude: '+data.error.message);
  return (data.content&&data.content[0]&&data.content[0].text)||'';
}

async function callClaudeJSON(ak, prompt, text) {
  const raw = await callClaude(ak, prompt, text, 2000);
  const clean = raw.replace(/```json|```/g,'').trim();
  return JSON.parse(clean);
}

async function writeTab(sid, tab, headers, keys, data) {
  const vals = keys.map(k=>{const v=data[k];return(v===null||v===undefined)?'':String(v);});
  const res = await fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({sheetId:sid,tab,headers,values:vals})});
  const result = await res.json();
  if(result.error) throw new Error('Sheets: '+result.error);
  return {keys,headers,data};
}

function speakText(text) {
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 0.92; utt.pitch = 1.0; utt.volume = 1.0;
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v=>v.name.includes('Samantha')||v.name.includes('Alex')||v.name.includes('Daniel'));
  if(preferred) utt.voice = preferred;
  window.speechSynthesis.speak(utt);
}

/* ══ WEEKLY ANALYSIS SCREEN ═════════════════════════════════════ */
function WeeklyScreen({onBack}){
  const [status,setStatus] = useState('idle'); // idle|loading|chatting|done
  const [messages,setMessages] = useState([]);
  const [input,setInput] = useState('');
  const [csvLoaded,setCsvLoaded] = useState(false);
  const [csvText,setCsvText] = useState('');
  const fileRef = useRef(null);
  const ak = lget('ak','');
  const prevReport = lget('prev_sunday_report','');

  const handleFile = (e) => {
    const f = e.target.files[0];
    if(!f) return;
    const reader = new FileReader();
    reader.onload = (ev) => { setCsvText(ev.target.result); setCsvLoaded(true); };
    reader.readAsText(f);
  };

  const startAnalysis = async () => {
    if(!csvText||!ak) return;
    setStatus('loading');
    try {
      const prompt = WEEKLY_PROMPT(csvText, prevReport);
      const response = await callClaude(ak, prompt, '', 2000);
      setMessages([{role:'coach',text:response}]);
      setStatus('chatting');
    } catch(e) { setMessages([{role:'coach',text:'Error: '+e.message}]); setStatus('chatting'); }
  };

  const sendReply = async () => {
    if(!input.trim()) return;
    const userMsg = input.trim(); setInput('');
    const updated = [...messages,{role:'avkar',text:userMsg}];
    setMessages(updated); setStatus('loading');
    try {
      const history = updated.map(m=>`${m.role==='coach'?'Coach':'Avkar'}: ${m.text}`).join('\n\n');
      const continuePrompt = `${MASTER_CTX}\n\nYou are mid-way through Avkar's Sunday recalibration session. Continue the coaching conversation. Stay in the protocol. One concept at a time. End with one physical action.\n\nCONVERSATION SO FAR:\n${history}\n\nRespond as coach now:`;
      const reply = await callClaude(ak, continuePrompt, '', 800);
      setMessages([...updated,{role:'coach',text:reply}]);
      setStatus('chatting');
    } catch(e) { setStatus('chatting'); }
  };

  const saveReport = () => {
    const reportText = messages.filter(m=>m.role==='coach').map(m=>m.text).join('\n\n---\n\n');
    lset('prev_sunday_report', `SUNDAY REPORT ${TODAY}:\n${reportText}`);
    alert('Report saved for next week reference.');
  };

  return h('div',{style:{display:'flex',flexDirection:'column',height:'100vh',height:'100dvh',position:'relative',zIndex:1,overflow:'hidden'}},
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'13px 22px',borderBottom:'1px solid var(--border)',flexShrink:0,background:'var(--bg2)'}},
      h('span',{style:{color:'var(--amber)',fontFamily:'monospace',fontSize:14,letterSpacing:2,fontWeight:700}},'✦  SUNDAY RECALIBRATION'),
      h('button',{className:'btn-nav',onClick:onBack},'← Back')
    ),
    status==='idle'&&h('div',{style:{flex:1,overflowY:'auto',padding:'28px 22px'}},
      h('div',{style:{borderLeft:'3px solid var(--amber-d)',paddingLeft:18,marginBottom:28,color:'var(--text2)',fontStyle:'italic',fontSize:15,lineHeight:1.8}},'The Sunday session only works if you bring real data and real answers. The data is the truth.'),
      h('div',{style:{color:'var(--text1)',fontSize:20,fontWeight:700,marginBottom:6}},'Upload Your Week\'s Data'),
      h('div',{style:{color:'var(--text2)',fontSize:13,marginBottom:24,lineHeight:1.7}},'Export your Google Sheet as CSV (File → Download → CSV) then upload it here. Claude will run the full 7-step weekly analysis.'),
      !csvLoaded&&h('button',{onClick:()=>fileRef.current.click(),style:{width:'100%',background:'var(--bg2)',border:'2px dashed var(--border2)',borderRadius:14,color:'var(--text2)',padding:'40px 20px',fontFamily:'monospace',fontSize:14,letterSpacing:1,marginBottom:16}},'📂   TAP TO UPLOAD CSV FILE'),
      h('input',{ref:fileRef,type:'file',accept:'.csv',onChange:handleFile,style:{display:'none'}}),
      csvLoaded&&h('div',{style:{background:'var(--bg2)',border:'1px solid var(--green)',borderRadius:12,padding:'16px 20px',marginBottom:20,display:'flex',alignItems:'center',gap:12}},
        h('span',{style:{fontSize:20}},'✓'),
        h('div',null,
          h('div',{style:{color:'var(--green)',fontFamily:'monospace',fontSize:13,fontWeight:700}},'CSV Loaded'),
          h('div',{style:{color:'var(--text3)',fontFamily:'monospace',fontSize:11,marginTop:2}},`${csvText.split('\n').length} rows of data`)
        )
      ),
      csvLoaded&&h('button',{onClick:startAnalysis,style:{width:'100%',background:'linear-gradient(135deg,var(--amber-d),var(--amber))',border:'none',borderRadius:14,color:'#fff',fontSize:15,fontWeight:900,letterSpacing:3,fontFamily:'monospace',padding:'20px'}},'START ANALYSIS →')
    ),
    status==='loading'&&h('div',{style:{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}},
      h('div',{style:{fontSize:40}},'⏳'),
      h('div',{style:{color:'var(--amber)',fontFamily:'monospace',fontSize:14,letterSpacing:2}},'CLAUDE IS READING YOUR WEEK...')

        h('div',{style:{display:'flex',flexDirection:'column',gap:6}},
          h('button',{onClick:sendReply,style:{background:'linear-gradient(135deg,var(--amber-d),var(--amber))',border:'none',borderRadius:10,color:'#fff',padding:'14px 18px',fontFamily:'monospace',fontSize:12,fontWeight:900,letterSpacing:1}},'SEND'),
          h('button',{onClick:saveReport,style:{background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:10,color:'var(--text3)',padding:'10px 14px',fontFamily:'monospace',fontSize:11}},'SAVE')
        )
      )
    )

/* ══ JOURNAL SCREEN ══════════════════════════════════════════════ */
function JournalScreen({session,onBack}){
  const [showGuide,setShowGuide]=useState(true);
  const [text,setText]=useState('');
  const [status,setStatus]=useState('idle');
  const [statusMsg,setStatusMsg]=useState('');
  const [coaching,setCoaching]=useState(null);
  const [intervention,setIntervention]=useState(null);
  const [speaking,setSpeaking]=useState(false);
  const meta=META[session]; const guide=GUIDES[session];
  const words=text.trim()?text.trim().split(/\s+/).length:0;
  const ak=lget('ak',''); const sid=lget('sid','');

  const speak=(t)=>{
    if(speaking){window.speechSynthesis.cancel();setSpeaking(false);return;}
    speakText(t); setSpeaking(true);
    const check=setInterval(()=>{if(!window.speechSynthesis.speaking){setSpeaking(false);clearInterval(check);}},500);
  };

  const handleSave=async()=>{
    if(!text.trim()) return;
    if(!ak||!sid){setStatusMsg('Missing credentials — tap ⚙ Settings on home screen.');setStatus('error');return;}
    setStatus('saving'); setStatusMsg('');
    try {
      let extractedData = null;
      if(session==='premarket'){
        setStatusMsg('Extracting pre-market fields…');
        const d=await callClaudeJSON(ak,PM_EXTRACT,text);
        setStatusMsg('Writing to Google Sheets…');
        await writeTab(sid,'Pre-Market Prep',T1H,T1K,d);
        extractedData={sessionType:'PRE-MARKET',data:d};
        // Pre-session intervention
        setStatusMsg('Running readiness check…');
        const intText=await callClaude(ak,PRE_SESSION_PROMPT(d),'',400);
        const scoreMatch=intText.match(/(\d+)\/10/);
        const score=scoreMatch?parseInt(scoreMatch[1]):5;
        setIntervention({text:intText,score});
      } else if(session==='tradelog'){
        setStatusMsg('Extracting trade fields…');
        const d=await callClaudeJSON(ak,TL_EXTRACT,text);
        setStatusMsg('Writing to Google Sheets…');
        await writeTab(sid,'Trade Log',T2H,T2K,d);
        extractedData={sessionType:'TRADE LOG',data:d};
      } else {
        setStatusMsg('Extracting EOD data (1/2)…');
        const d3=await callClaudeJSON(ak,E3_EXTRACT,text);
        setStatusMsg('Extracting identity data (2/2)…');
        const d4=await callClaudeJSON(ak,E4_EXTRACT,text);
        if(!d4.date&&d3.date)d4.date=d3.date;
        setStatusMsg('Writing EOD Debrief…');
        await writeTab(sid,'EOD Debrief',T3H,T3K,d3);
        setStatusMsg('Writing Daily Life & Identity…');
        await writeTab(sid,'Daily Life & Identity',T4H,T4K,d4);
        extractedData={sessionType:'END OF DAY',data:{...d3,...d4}};
      }
      // Get coaching response
      setStatusMsg('Generating coaching response…');
      const coachTxt=await callClaude(ak,DAILY_COACH_PROMPT(extractedData.sessionType,extractedData.data),'',600);
      // Save to Coaching Log
      const clData={
        date:TODAY, session_type:extractedData.sessionType,
        readiness_score:intervention?String(intervention.score):'',
        emotional_state:extractedData.data.feeling_emotional_state||extractedData.data.nervous_system_state||extractedData.data.overall_emotional_state||'',
        coaching_response:coachTxt,
        intervention_triggered:intervention?(intervention.score<=7?'Y':'N'):'N',
        intervention_type:intervention&&intervention.score<=7?'Pre-session readiness':'',
        daily_pattern_identified:extractedData.data.pattern_claude_identified||'',
        key_insight_today:'', weekly_summary:''
      };
      await writeTab(sid,'Coaching Log',TCH,TCK,clData);
      setText('');
      setStatus('idle'); setStatusMsg('');
      if(!intervention) setCoaching(coachTxt);
    } catch(e){setStatus('error');setStatusMsg(e.message);}
  };

  const btnBg=status==='saving'?'var(--bg3)':status==='error'?'linear-gradient(135deg,#8a3030,var(--red))':'linear-gradient(135deg,var(--amber-d),var(--amber))';
  const btnTxt=status==='saving'?statusMsg||'SAVING...':status==='error'?'⚠ ERROR — TAP TO RETRY':'EXTRACT & SAVE TO GOOGLE SHEETS →';

  if(coaching) return h(CoachingDisplay,{text:coaching,onClose:()=>setCoaching(null),onSpeak:()=>speak(coaching),speaking});
  if(intervention) return h(InterventionScreen,{text:intervention.text,score:intervention.score,onProceed:()=>{setIntervention(null);setCoaching(null);},onSpeak:()=>speak(intervention.text),speaking});

  return h('div',{style:{display:'flex',flexDirection:'column',height:'100vh',height:'100dvh',position:'relative',zIndex:1,overflow:'hidden'}},
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'13px 22px',borderBottom:'1px solid var(--border)',flexShrink:0,background:'var(--bg2)'}},
      h('span',{style:{color:'var(--amber)',fontFamily:'monospace',fontSize:14,letterSpacing:2,fontWeight:700}},'✦  AVKAR · JOURNAL'),
      h('button',{className:'btn-nav',onClick:onBack},'← Back')
    ),
    h('div',{style:{padding:'10px 22px',borderBottom:'1px solid var(--border)',flexShrink:0,display:'flex',alignItems:'center',gap:14,background:'var(--bg2)'}},
      h('span',{style:{background:'var(--bg3)',border:'1px solid var(--border2)',color:meta.color,fontFamily:'monospace',fontSize:11,padding:'4px 16px',borderRadius:20,letterSpacing:2,fontWeight:700}},meta.label),
      h('span',{style:{color:'var(--text3)',fontFamily:'monospace',fontSize:12}},meta.sub)
    ),
    h('button',{onClick:()=>setShowGuide(v=>!v),style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 22px',background:'var(--bg3)',border:'none',borderBottom:'1px solid var(--border)',color:'var(--text2)',fontFamily:'monospace',fontSize:14,fontWeight:700,flexShrink:0,width:'100%',textAlign:'left',letterSpacing:1}},
      h('span',null,'📋   '+(showGuide?'Hide':'Show')+' Speaking Guide'),
      h('span',{style:{opacity:.45,fontSize:12}},showGuide?'▲':'▼')
    ),
    status==='saving'&&h('div',{style:{padding:'7px 22px',background:'var(--bg3)',borderBottom:'1px solid var(--border)',color:'var(--amber)',fontFamily:'monospace',fontSize:11,letterSpacing:1,flexShrink:0}},statusMsg),
    status==='error'&&h('div',{style:{padding:'8px 22px',background:'rgba(224,120,120,.1)',borderBottom:'1px solid rgba(224,120,120,.3)',color:'var(--red)',fontFamily:'monospace',fontSize:11,flexShrink:0,lineHeight:1.5}},statusMsg),
    h('div',{style:{flex:1,display:'flex',overflow:'hidden',minHeight:0}},
      showGuide&&h(GuidePanel,{guide}),
      h('div',{style:{flex:1,display:'flex',flexDirection:'column',padding:'14px 18px',overflow:'hidden'}},
        h('div',{style:{position:'relative',flex:1,display:'flex',flexDirection:'column',minHeight:0}},
          h('textarea',{value:text,onChange:ev=>setText(ev.target.value),placeholder:'Tap here → tap 🎤 mic on keyboard → speak freely about all topics in the guide…',style:{flex:1,height:'100%'}}),
          h('div',{style:{position:'absolute',top:14,right:14,fontSize:17,pointerEvents:'none',opacity:.25}},'🎤'),
          h('div',{style:{position:'absolute',bottom:11,right:14,color:'var(--text3)',fontFamily:'monospace',fontSize:12}},words+' words')
        )
      )
    ),
    h('div',{style:{flexShrink:0,paddingBottom:'env(safe-area-inset-bottom)'}},
      h('button',{onClick:status==='saving'?null:handleSave,disabled:status==='saving',style:{width:'100%',padding:'19px',background:btnBg,border:'none',color:status==='saving'?'var(--amber)':'#fff',fontFamily:'monospace',fontSize:14,fontWeight:900,letterSpacing:3,transition:'all .3s',display:'block'}},btnTxt)
    )
  );
}

/* ══ SESSION SELECTOR ════════════════════════════════════════════ */
function SessionSelector({onSelect,onHome,onWeekly}){
  const sessions=[
    {id:'premarket',icon:'🌅',label:'Pre Market',color:'var(--teal)',meta:'Tab 1 · Before 9:30 AM'},
    {id:'tradelog',icon:'📊',label:'Trade Log',color:'var(--amber)',meta:'Tab 2 · After each trade'},
    {id:'eod',icon:'🌙',label:'End of Day',color:'var(--green)',meta:'Tabs 3+4 · After session'},
  ];
  return h('div',{style:{position:'relative',zIndex:1,height:'100vh',height:'100dvh',background:'var(--bg)',display:'flex',flexDirection:'column'}},
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'13px 22px',borderBottom:'1px solid var(--border)',background:'var(--bg2)',flexShrink:0}},
      h('span',{style:{color:'var(--amber)',fontFamily:'monospace',fontSize:14,letterSpacing:2,fontWeight:700}},'✦  AVKAR · JOURNAL'),
      h('button',{className:'btn-nav',onClick:onHome},'🏠  Home')
    ),
    h('div',{style:{padding:'28px 22px',overflowY:'auto',flex:1}},
      h('div',{style:{borderLeft:'3px solid var(--amber-d)',paddingLeft:18,marginBottom:34,color:'var(--text2)',fontStyle:'italic',fontSize:16,lineHeight:1.8}},
        '"The undisciplined trader\'s biggest enemy is himself. The journal is the mirror."',
        h('div',{style:{color:'var(--text3)',fontFamily:'monospace',fontSize:12,marginTop:8,letterSpacing:1}},'— Mark Douglas')
      ),
      h('div',{style:{color:'var(--text1)',fontSize:23,fontWeight:700,marginBottom:7,letterSpacing:.5}},'What are you logging?'),
      h('div',{style:{color:'var(--amber)',fontFamily:'monospace',fontSize:12,letterSpacing:2,marginBottom:26}},'CHOOSE YOUR SESSION TYPE'),
      h('div',{style:{display:'flex',gap:16,flexWrap:'wrap',marginBottom:20}},
        sessions.map(s=>h('button',{key:s.id,onClick:()=>onSelect(s.id),style:{flex:'1 1 170px',minHeight:124,background:'var(--bg2)',border:'1.5px solid var(--border2)',borderRadius:14,color:s.color,fontSize:17,fontWeight:700,letterSpacing:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:10,padding:20,fontFamily:'Georgia,serif',transition:'background .15s'}},
          h('span',{style:{fontSize:28}},s.icon),
          h('span',null,s.label),
          h('span',{style:{color:'var(--text3)',fontSize:12,fontFamily:'monospace',fontWeight:400,marginTop:2}},s.meta)
        ))
      ),
      IS_SUNDAY&&h('button',{onClick:onWeekly,style:{width:'100%',background:'linear-gradient(135deg,#2a1a4a,#3d2a6a)',border:'1px solid var(--purple)',borderRadius:14,color:'var(--purple)',fontSize:15,fontWeight:700,letterSpacing:2,padding:'18px 20px',fontFamily:'monospace',display:'flex',alignItems:'center',justifyContent:'center',gap:12}},
        h('span',{style:{fontSize:22}},'📊'),
        h('span',null,'SUNDAY RECALIBRATION')
      ),
      !IS_SUNDAY&&h('button',{onClick:onWeekly,style:{width:'100%',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:14,color:'var(--text3)',fontSize:13,fontWeight:700,letterSpacing:2,padding:'14px 20px',fontFamily:'monospace',display:'flex',alignItems:'center',justifyContent:'center',gap:10}},
        h('span',null,'📊  Weekly Analysis (Sunday)')
      )
    )
  );
}

/* ══ SPLASH ══════════════════════════════════════════════════════ */
function Splash({quotes,onStart,onSettings}){
  const [idx,setIdx]=useState(0);
  const [fade,setFade]=useState(true);
  const [now,setNow]=useState(new Date());
  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),30000);return()=>clearInterval(t);},[]);
  useEffect(()=>{
    if(quotes.length<=1)return;
    const t=setInterval(()=>{setFade(false);setTimeout(()=>{setIdx(i=>(i+1)%quotes.length);setFade(true);},400);},60000);
    return()=>clearInterval(t);
  },[quotes.length]);
  const q=quotes[idx]||quotes[0];
  const ds=now.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
  const ts=now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  return h('div',{style:{height:'100vh',height:'100dvh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',position:'relative',zIndex:1,padding:'40px 36px'}},
    h('div',{style:{fontFamily:'monospace',fontSize:12,letterSpacing:5,color:'var(--amber)',marginBottom:54,opacity:.9,display:'flex',alignItems:'center',gap:12}},
      h('span',{style:{fontSize:15}},'✦'),'AVKAR',h('span',{style:{opacity:.3}},'·'),'TRADING JOURNAL'
    ),
    h('div',{style:{textAlign:'center',maxWidth:580,marginBottom:60,transition:'opacity .4s',opacity:fade?1:0}},
      h('div',{style:{color:'var(--text1)',fontFamily:'Georgia,serif',fontSize:24,fontStyle:'italic',lineHeight:1.8,marginBottom:20}},'"'+q.text+'"'),
      q.author&&h('div',{style:{color:'var(--amber-d)',fontFamily:'monospace',fontSize:12,letterSpacing:3}},'— '+q.author.toUpperCase())
    ),
    h('button',{className:'btn-cta',onClick:onStart},'START JOURNAL SESSION'),
    h('div',{style:{display:'flex',gap:14,marginTop:22}},
      IS_SUNDAY&&h('button',{onClick:onStart,style:{background:'linear-gradient(135deg,#2a1a4a,#3d2a6a)',border:'1px solid var(--purple)',color:'var(--purple)',borderRadius:11,padding:'11px 22px',fontFamily:'monospace',fontSize:13,letterSpacing:1}},'📊 Sunday Analysis'),
      h('button',{onClick:onSettings,style:{background:'none',border:'1px solid var(--border2)',color:'var(--text3)',borderRadius:11,padding:'11px 22px',fontFamily:'monospace',fontSize:13,letterSpacing:1}},'⚙  Settings')
    ),
    h('div',{style:{position:'absolute',bottom:30,color:'var(--text3)',fontFamily:'monospace',fontSize:12,letterSpacing:2}},ds+' · '+ts)
  );
}

/* ══ APP ═════════════════════════════════════════════════════════ */
function App(){
  const [screen,setScreen]=useState('splash');
  const [session,setSession]=useState(null);
  const [showSettings,setShowSettings]=useState(false);
  useEffect(()=>{if(!lget('ak','')||!lget('sid',''))setShowSettings(true);},[]);
  return h('div',{style:{height:'100vh',height:'100dvh',background:'var(--bg)',overflow:'hidden'}},
    h(Stars),
    showSettings&&h(SettingsModal,{onClose:()=>setShowSettings(false)}),
    screen==='splash'&&h(Splash,{quotes:ALL_QUOTES,onStart:()=>setScreen('select'),onSettings:()=>setShowSettings(true)}),
    screen==='select'&&h(SessionSelector,{onSelect:s=>{setSession(s);setScreen('journal');},onHome:()=>setScreen('splash'),onWeekly:()=>setScreen('weekly')}),
    screen==='journal'&&h(JournalScreen,{session,onBack:()=>setScreen('select')}),
    screen==='weekly'&&h(WeeklyScreen,{onBack:()=>setScreen('select')})
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
