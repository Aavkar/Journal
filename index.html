═══ TRADING SYSTEM — FOUNDATION ═══
Instrument: NQ Futures. Session: 9:30 AM–12:00 PM ET only. Analysis: QQQ on TradingView. Execution: Tradovate.

CORE IDEA: Identify who is in control from previous day, determine where today's battle starts relative to fair value, wait for price to return to a key level, confirm who wins that battle, enter with them.

2-DAY AVWAP: Anchored from previous day's open. Fair value / point of control. Above AVWAP = buyers in control, bullish bias. Below = sellers in control, bearish bias. The battlefield line. When price returns to AVWAP, institutions who bought/sold yesterday are forced into a decision. That decision creates the reaction. His entry is at that moment with confirmation.

REPEATING LOGIC (same across ALL candle types): Price moves away from a key level → comes back to test that level → shows confirmation it cannot hold → enter in direction of original move. The level changes (AVWAP, pre-market high/low, previous day close, opening range) but the logic never changes.

THE THREE CRITERIA FOR EVERY ENTRY:
1. LEVEL TOUCHED — price must reach the predefined level, not approach it
2. REACTION SHOWN — price must show rejection or acceptance at the level
3. CONFIRMATION CANDLE CLOSED — the candle confirming the reaction must fully close
Missing any one = not a setup. Entering without all three = a candle trade. Candle trades are V1 trades.

STOP LOSS: Always ATR-based. Standard 2ATR below entry (longs) / 2ATR above entry (shorts). Never fixed point stops.

IMPORTANT LEVELS: PDC · PDH · PDL · PDO · VWAP (daily) · AVWAP (2-day) · Today's open · 1H structure · Important Daily level · Pre-market high and low · ORH · ORL

═══ THE THREE QUESTIONS (never skip, never reorder) ═══
Every trade decision flows through these three questions in sequence. If he cannot answer all three with specific data — there is no trade.

Q1 ENVIRONMENT: What is the environment today? Read dashboard before price. Score, TICK, VOLD, MAG7, VIX, DXY. If dashboard says BEAR, no longs regardless of how clean the setup. Environment is the permission slip.

Q2 LEVELS: Where are the key levels? Mark PDH, PDL, PDC, PDO, ONH, ONL, ORH, ORL, AVWAP, VWAP before RTH. These are the only areas where entries are considered. No level = no trade. This is where scenario identification happens — which candle scenario from his strategy is active today.

Q3 CONFIRMATION: Does price action at a level confirm the environment? All aligned = full conviction. Two out of three = reduced size only. One or zero = no trade. His candle confirmation IS Question 3.

He never skips to Q3. Levels and dashboard answer Q1/Q2 before market opens. He waits for price — does not chase.

1-2/7 = tech weak, avoid longs
0/7 = max risk-off, no longs

VIX: Spiked overnight = reduce first trade size. Calm/falling = normal sizing.
DXY: Rising = headwind for NQ longs. Falling = tailwind.

═══ TIMEFRAME HIERARCHY ═══

5-min: Entry confirmation filter only (3-sec glance pre-entry). Strong bullish/bearish candle at level = full size. Doji = warning. Opposite-direction strong candle = skip.
1-min: Everything else. Entry on first candle that closes back above key level after pullback (not on initial break — retest and hold). Stop below most recent structural swing low. Trade alive while HH/HL. First lower low = exit signal.

═══ CANDLE SCENARIO LOGIC (condensed) ═══
Every day starts with yesterday's candle type. That sets bias. Then today's open relative to AVWAP activates ONE scenario. By 9:35 AM the scenario tree collapses to ONE level and ONE behavior.

STRONG GREEN (bullish): S1 Gap up above prev day high — pullback to pre-market high/VWAP/prev day levels. S2 Gap down below AVWAP — conflict, AVWAP is key. S3 Open above AVWAP between prev day high/close — AVWAP defense or rejection.
STRONG RED (bearish): S1 Gap down below prev day low. S2 Gap up above AVWAP — conflict. S3 Open below AVWAP between prev day low/close.
DOJI (indecision, AVWAP reaction IS the decision): S1 Open near high. S2 Open near low. S3 Open in between — wait for break first.
HAMMER (bullish reversal): S1 Open above prev day high/AVWAP — long bias. S2 Open around prev day low below AVWAP — multiple possibilities. S3 Between.
PIN BAR, NORMAL BOTH SIDES WICK (green and red): Each has 3 open scenarios with identical logic — pre-day level/AVWAP/pre-market level reaction.

P3 EARLY EXIT = survival pressure overrides plan. Target was defined pre-entry. Exiting before target = abandoning plan because of emotion, not information.

P4 ZOMBIE TRADE = Signal 3, PFC offline. No level, no confirmation, just a click after a loss. Overtrading urge drove it.

I. Never enter without stop loss defined before entry.
II. Never add to a losing position.
III. Never trade without reading dashboard first. Environment before price.

2 consecutive losses → 15-min break, step away.
2 unplanned trades → stop. Zombie mode. Re-read plan.

- THREE CRITERIA missed repeatedly → "Which of the three — level touched, reaction shown, candle closed — are you most willing to skip? That one is not about patience. It is about what you are trying to prove by entering early."
- Trades against environment frequent → "You took X trades against your dashboard score. What were you trying to fix? Not the trade — what were you trying to fix?"
- Scenario read right but traded wrong → "You read the scenario correctly. You traded it wrong. What happens between reading and clicking that converts the right read into the wrong trade?"

Ask. Wait. If answer too polished: "Does it actually land or does it just sound right? What do you feel in your body when you say it?"

STEP 4 — Challenge his rationalization. "Market was difficult" → were scores low on easy days too? "I was tired" → did he complete ritual those days? "Next week will be different because Y" → what specifically is different not feels different? "The strategy isn't working" → how many trades met ALL THREE CRITERIA this week? If low — the strategy wasn't tested, it was bypassed.

STEP 5 — Honest assessment ONE sentence: Changing / Maintaining / Sliding / Looping — with specific behavioral evidence (not P&L).

STEP 6 — Five assignments:
1. Behavioral focus — specific action not vague intention.
2. Micro-action — Claude assigns based on lowest V2 pillar, completable in degraded state, so small it feels stupid.
3. Shadow question — next in sequence (W1 protection, W2 waiting room, W3 father, W4 original self, W5 escape, W6 permission) or specific to pattern.
4. Defence mechanism to watch — describe what it looks like when it activates in HIS context.
5. Secondary gain to challenge — name payoff + one V2 alternative moment this week.
Optional 6. Strategy execution focus — one element of THREE CRITERIA/QUESTIONS to audit. Example: "This week before every entry speak all three aloud: level touched, reaction shown, candle closed. If cannot say all three — no trade."

STEP 7 — Two mandatory questions:
Q1: "What is one specific thing you did this week that the original kid would be proud of?"
Q2: "On a scale of 1-10 — how close to him were you this week?"

/* ══ API HELPERS ═════════════════════════════════════════════════ */
async function callClaude(ak, prompt, text, maxTok) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':ak,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:maxTok||600,messages:[{role:'user',content:prompt+'\n'+(text||'')}]})
  });
  const data = await res.json();
  if(data.error) throw new Error('Claude: '+data.error.message);
  return (data.content&&data.content[0]&&data.content[0].text)||'';
}

async function callClaudeJSON(ak, prompt, text) {
  const raw = await callClaude(ak, prompt, text, 2000);
  const clean = raw.replace(/```json|```/g,'').trim();
  return JSON.parse(clean);
}

async function writeTab(sid, tab, headers, keys, data) {
  const vals = keys.map(function(k){var v=data[k];return(v===null||v===undefined)?'':String(v);});
  const res = await fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({sheetId:sid,tab:tab,headers:headers,values:vals})});
  const result = await res.json();
  if(result.error) throw new Error('Sheets: '+result.error);
  return {keys:keys,headers:headers,data:data};
}

/* ══ MARKDOWN STRIPPER (bug fix #3) ══════════════════════════════ */
function stripMarkdown(txt) {
  if(!txt) return '';
  return txt
    .replace(/^#{1,6}\s+/gm, '')              // headings ## etc
    .replace(/\*\*(.+?)\*\*/g, '$1')          // bold **
    .replace(/__(.+?)__/g, '$1')              // bold __
    .replace(/\*([^\*\n]+?)\*/g, '$1')        // italic *
    .replace(/_([^_\n]+?)_/g, '$1')           // italic _
    .replace(/`([^`\n]+?)`/g, '$1')           // inline code
    .replace(/```[\s\S]*?```/g, '')           // fenced code
    .replace(/^\s*[-*+]\s+/gm, '• ')          // list markers → bullets
    .replace(/^\|.*\|$/gm, function(line) {   // table rows: strip pipes
       return line.replace(/\|/g, ' ').replace(/\s+/g, ' ').trim();
    })
    .replace(/^[\s|:-]+$/gm, '')              // table dividers
    .replace(/━━+/g, '')                       // heavy lines
    .replace(/═══+/g, '')                      // heavy double lines
    .replace(/\n{3,}/g, '\n\n')                // collapse extra blank lines
    .trim();
}

/* ══ VOICE UPGRADE (bug fix + voice priority + wake lock) ════════ */
let cachedVoice = null;

function pickVoice() {
  if(cachedVoice) return cachedVoice;
  const voices = window.speechSynthesis.getVoices();
  if(!voices || !voices.length) return null;
  const priorityExact = [
    'Evan (Enhanced)','Evan (Premium)','Evan',
    'Nathan (Enhanced)','Nathan (Premium)','Nathan',
    'Tom (Enhanced)','Tom (Premium)','Tom',
    'Alex (Enhanced)','Alex (Premium)','Alex',
    'Lee (Enhanced)','Lee (Premium)','Lee'
  ];
  for(var i=0;i<priorityExact.length;i++) {
    var v = voices.find(function(x){return x.name===priorityExact[i];});
    if(v) { cachedVoice = v; return v; }
  }
  // any Enhanced/Premium English
  var enh = voices.find(function(x){return /Enhanced|Premium/.test(x.name) && /^en/.test(x.lang);});
  if(enh) { cachedVoice = enh; return enh; }
  // any en-GB
  var gb = voices.find(function(x){return x.lang==='en-GB';});
  if(gb) { cachedVoice = gb; return gb; }
  // any en-US
  var us = voices.find(function(x){return x.lang==='en-US';});
  if(us) { cachedVoice = us; return us; }
  return voices[0];
}

// Warm voice list — iOS populates asynchronously
if(window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = function(){ cachedVoice = null; pickVoice(); };
  setTimeout(function(){ pickVoice(); }, 200);
}

// Wake lock (keeps screen on during voice playback)
let wakeLock = null;
async function requestWakeLock() {
  try {
    if('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
    }
  } catch(e) {}
}
function releaseWakeLock() {
  try {
    if(wakeLock) { wakeLock.release(); wakeLock = null; }
  } catch(e) {}
}

async function speakText(text) {
  if(!window.speechSynthesis || !text) return;
  window.speechSynthesis.cancel();
  await requestWakeLock();
  // Chunk long text for reliability
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 0.95; utt.pitch = 1.0; utt.volume = 1.0;
  const v = pickVoice();
  if(v) utt.voice = v;
  utt.onend = function(){ releaseWakeLock(); };
  utt.onerror = function(){ releaseWakeLock(); };
  window.speechSynthesis.speak(utt);
}

function stopSpeaking() {
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  releaseWakeLock();
}

/* ══ VIEWPORT HOOK (bug fix #1 + #2: keyboard layout) ════════════ */
function useViewportHeight() {
  useEffect(function(){
    function update() {
      var vv = window.visualViewport;
      var vh = vv ? vv.height : window.innerHeight;
      document.documentElement.style.setProperty('--app-h', vh + 'px');
    }
    update();
    if(window.visualViewport) {
      window.visualViewport.addEventListener('resize', update);
      window.visualViewport.addEventListener('scroll', update);
    }
    window.addEventListener('resize', update);
    window.addEventListener('orientationchange', update);
    return function(){
      if(window.visualViewport) {
        window.visualViewport.removeEventListener('resize', update);
        window.visualViewport.removeEventListener('scroll', update);
      }
      window.removeEventListener('resize', update);
      window.removeEventListener('orientationchange', update);
    };
  }, []);
}

/* ══ WEEKLY ANALYSIS SCREEN ══════════════════════════════════════ */
function WeeklyScreen(props){
  useViewportHeight();
  const [status,setStatus] = useState('idle');
  const [messages,setMessages] = useState([]);
  const [input,setInput] = useState('');
  const [csvLoaded,setCsvLoaded] = useState(false);
  const [csvText,setCsvText] = useState('');
  const [speaking,setSpeaking] = useState(false);
  const fileRef = useRef(null);
  const ak = lget('ak','');
  const prevReport = lget('prev_sunday_report','');

  const handleFile = (e) => {
    const f = e.target.files[0];
    if(!f) return;
    const reader = new FileReader();
    reader.onload = (ev) => { setCsvText(ev.target.result); setCsvLoaded(true); };
    reader.readAsText(f);
  };

  const startAnalysis = async () => {
    if(!csvText||!ak) return;
    setStatus('loading');
    try {
      const prompt = WEEKLY_PROMPT(csvText, prevReport);
      const response = await callClaude(ak, prompt, '', 2500);
      setMessages([{role:'coach',text:stripMarkdown(response)}]);
      setStatus('chatting');
    } catch(e) { setMessages([{role:'coach',text:'Error: '+e.message}]); setStatus('chatting'); }
  };

  const sendReply = async () => {
    if(!input.trim()) return;
    const userMsg = input.trim(); setInput('');
    const updated = [...messages,{role:'avkar',text:userMsg}];
    setMessages(updated); setStatus('loading');
    try {
      const history = updated.map(function(m){return (m.role==='coach'?'Coach':'Avkar')+': '+m.text;}).join('\n\n');
      const continuePrompt = MASTER_CTX + '\n\nYou are mid-way through Avkar\'s Sunday recalibration. Continue the coaching conversation. Stay in the protocol. One concept at a time. End with one physical action. Plain text only — no markdown.\n\nCONVERSATION SO FAR:\n'+history+'\n\nRespond as coach now:';
      const reply = await callClaude(ak, continuePrompt, '', 1000);
      setMessages([...updated,{role:'coach',text:stripMarkdown(reply)}]);
      setStatus('chatting');
    } catch(e) { setStatus('chatting'); }
  };

  const saveReport = () => {
    const reportText = messages.filter(function(m){return m.role==='coach';}).map(function(m){return m.text;}).join('\n\n---\n\n');
    lset('prev_sunday_report', 'SUNDAY REPORT '+TODAY+':\n'+reportText);
    alert('Report saved for next week reference.');
  };

  const speakLast = () => {
    if(speaking) { stopSpeaking(); setSpeaking(false); return; }
    const lastCoach = [...messages].reverse().find(function(m){return m.role==='coach';});
    if(!lastCoach) return;
    speakText(lastCoach.text); setSpeaking(true);
    const check = setInterval(function(){if(!window.speechSynthesis.speaking){setSpeaking(false);clearInterval(check);}},500);
  };

  return h('div',{className:'app-screen',style:{position:'relative',zIndex:1}},
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'13px 22px',borderBottom:'1px solid var(--border)',flexShrink:0,background:'var(--bg2)'}},
      h('span',{style:{color:'var(--amber)',fontFamily:'monospace',fontSize:14,letterSpacing:2,fontWeight:700}},'✦  SUNDAY RECALIBRATION'),
      h('button',{className:'btn-nav',onClick:props.onBack},'← Back')
    ),
    status==='idle'&&h('div',{style:{flex:1,overflowY:'auto',padding:'28px 22px'}},
      h('div',{style:{borderLeft:'3px solid var(--amber-d)',paddingLeft:18,marginBottom:28,color:'var(--text2)',fontStyle:'italic',fontSize:15,lineHeight:1.8}},'The Sunday session only works if you bring real data and real answers. The data is the truth.'),
      h('div',{style:{color:'var(--text1)',fontSize:20,fontWeight:700,marginBottom:6}},'Upload Your Week\'s Data'),
      h('div',{style:{color:'var(--text2)',fontSize:13,marginBottom:24,lineHeight:1.7}},'Export your Google Sheet as CSV (File → Download → CSV) then upload it here.'),
      !csvLoaded&&h('button',{onClick:function(){fileRef.current.click();},style:{width:'100%',background:'var(--bg2)',border:'2px dashed var(--border2)',borderRadius:14,color:'var(--text2)',padding:'40px 20px',fontFamily:'monospace',fontSize:14,letterSpacing:1,marginBottom:16}},'📂   TAP TO UPLOAD CSV FILE'),
      h('input',{ref:fileRef,type:'file',accept:'.csv',onChange:handleFile,style:{display:'none'}}),
      csvLoaded&&h('div',{style:{background:'var(--bg2)',border:'1px solid var(--green)',borderRadius:12,padding:'16px 20px',marginBottom:20,display:'flex',alignItems:'center',gap:12}},
        h('span',{style:{fontSize:20}},'✓'),
        h('div',null,
          h('div',{style:{color:'var(--green)',fontFamily:'monospace',fontSize:13,fontWeight:700}},'CSV Loaded'),
          h('div',{style:{color:'var(--text3)',fontFamily:'monospace',fontSize:11,marginTop:2}},csvText.split('\n').length+' rows of data')
        )
      ),
      csvLoaded&&h('button',{onClick:startAnalysis,style:{width:'100%',background:'linear-gradient(135deg,var(--amber-d),var(--amber))',border:'none',borderRadius:14,color:'#fff',fontSize:15,fontWeight:900,letterSpacing:3,fontFamily:'monospace',padding:'20px'}},'START ANALYSIS →')
    ),
    status==='loading'&&messages.length===0&&h('div',{style:{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}},
      h('div',{style:{fontSize:40}},'⏳'),
      h('div',{style:{color:'var(--amber)',fontFamily:'monospace',fontSize:14,letterSpacing:2}},'CLAUDE IS READING YOUR WEEK...')
    ),
    (status==='chatting'||(status==='loading'&&messages.length>0))&&h('div',{style:{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}},
      h('div',{style:{flex:1,overflowY:'auto',padding:'16px 18px',display:'flex',flexDirection:'column',gap:16}},
        messages.map(function(m,i){return h('div',{key:i,style:{alignSelf:m.role==='coach'?'flex-start':'flex-end',maxWidth:'88%',background:m.role==='coach'?'var(--bg2)':'var(--bg3)',border:'1px solid '+(m.role==='coach'?'var(--border)':'var(--amber-d)'),borderRadius:12,padding:'14px 16px'}},
          h('div',{style:{color:m.role==='coach'?'var(--amber)':'var(--amber-d)',fontFamily:'monospace',fontSize:10,letterSpacing:2,marginBottom:8,fontWeight:700}},m.role==='coach'?'COACH':'AVKAR'),
          h('div',{style:{color:'var(--text1)',fontSize:14,lineHeight:1.8,fontFamily:'Georgia,serif',whiteSpace:'pre-wrap'}},m.text)
        );}),
        status==='loading'&&h('div',{style:{color:'var(--amber)',fontFamily:'monospace',fontSize:12,padding:'8px 0'}},'...')
      ),
      h('div',{className:'submit-bar',style:{padding:'10px 14px',background:'var(--bg2)',display:'flex',gap:8,alignItems:'flex-end'}},
        h('textarea',{value:input,onChange:function(e){setInput(e.target.value);},placeholder:'Your response...',style:{flex:1,minHeight:60,maxHeight:120,fontSize:14,padding:'10px 12px',background:'var(--bg)',border:'1px solid var(--border2)',borderRadius:10,resize:'none',fontFamily:'Georgia,serif',color:'var(--text1)'}}),
        h('div',{style:{display:'flex',flexDirection:'column',gap:6}},
          h('button',{onClick:sendReply,style:{background:'linear-gradient(135deg,var(--amber-d),var(--amber))',border:'none',borderRadius:10,color:'#fff',padding:'14px 18px',fontFamily:'monospace',fontSize:12,fontWeight:900,letterSpacing:1}},'SEND'),
          h('button',{onClick:speakLast,style:{background:speaking?'var(--amber)':'var(--bg3)',border:'1px solid var(--border2)',borderRadius:10,color:speaking?'#000':'var(--text3)',padding:'10px 14px',fontFamily:'monospace',fontSize:11}},speaking?'⏹':'🔊'),
          h('button',{onClick:saveReport,style:{background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:10,color:'var(--text3)',padding:'10px 14px',fontFamily:'monospace',fontSize:11}},'SAVE')
        )
      )
    )
  );
}

/* ══ JOURNAL SCREEN ══════════════════════════════════════════════ */
function JournalScreen(props){
  useViewportHeight();
  const session = props.session;
  const [showGuide,setShowGuide]=useState(true);
  const [text,setText]=useState('');
  const [status,setStatus]=useState('idle');
  const [statusMsg,setStatusMsg]=useState('');
  const [coaching,setCoaching]=useState(null);
  const [intervention,setIntervention]=useState(null);
  const [speaking,setSpeaking]=useState(false);
  const meta=META[session]; const guide=GUIDES[session];
  const words=text.trim()?text.trim().split(/\s+/).length:0;
  const ak=lget('ak',''); const sid=lget('sid','');

  const speak=function(t){
    if(speaking){stopSpeaking();setSpeaking(false);return;}
    speakText(t); setSpeaking(true);
    const check=setInterval(function(){if(!window.speechSynthesis.speaking){setSpeaking(false);clearInterval(check);}},500);
  };

  const handleSave=async function(){
    if(!text.trim()) return;
    if(!ak||!sid){setStatusMsg('Missing credentials — tap ⚙ Settings on home screen.');setStatus('error');return;}
    setStatus('saving'); setStatusMsg('');
    try {
      let extractedData = null;
      let interventionData = null;  // LOCAL variable — not state

      if(session==='premarket'){
        setStatusMsg('Extracting pre-market fields…');
        const d = await callClaudeJSON(ak,PM_EXTRACT,text);
        setStatusMsg('Writing Pre-Market Prep tab…');
        await writeTab(sid,'Pre-Market Prep',T1H,T1K,d);
        // Save PM data for EOD coaching context (Pre-Market → EOD connection)
        lset('last_premarket_data', JSON.stringify({date:TODAY,data:d}));
        extractedData = {sessionType:'PRE-MARKET',data:d};
        setStatusMsg('Running readiness check…');
        const intText = await callClaude(ak,PRE_SESSION_PROMPT(d),'',500);
        const cleanInt = stripMarkdown(intText);
        const scoreMatch = cleanInt.match(/(\d+)\s*\/\s*10/);
        const score = scoreMatch?parseInt(scoreMatch[1]):5;
        interventionData = {text:cleanInt,score:score};
      } else if(session==='tradelog'){
        setStatusMsg('Extracting trade fields…');
        const d = await callClaudeJSON(ak,TL_EXTRACT,text);
        setStatusMsg('Writing Trade Log tab…');
        await writeTab(sid,'Trade Log',T2H,T2K,d);
        extractedData = {sessionType:'TRADE LOG',data:d};
      } else {
        setStatusMsg('Extracting EOD data (1/2)…');
        const d3 = await callClaudeJSON(ak,E3_EXTRACT,text);
        setStatusMsg('Extracting identity data (2/2)…');
        const d4 = await callClaudeJSON(ak,E4_EXTRACT,text);
        if(!d4.date&&d3.date) d4.date=d3.date;
        setStatusMsg('Writing EOD Debrief…');
        await writeTab(sid,'EOD Debrief',T3H,T3K,d3);
        setStatusMsg('Writing Daily Life & Identity…');
        await writeTab(sid,'Daily Life & Identity',T4H,T4K,d4);
        extractedData = {sessionType:'END OF DAY',data:Object.assign({},d3,d4)};
      }

      // Generate coaching — with premarket context for EOD
      setStatusMsg('Generating coaching response…');
      let premarketContext = '';
      if(session==='eod'){
        try {
          const saved = lget('last_premarket_data','');
          if(saved) {
            const parsed = JSON.parse(saved);
            if(parsed.date===TODAY) premarketContext = JSON.stringify(parsed.data);
          }
        } catch(e){}
      }
      const coachTxt = await callClaude(ak,DAILY_COACH_PROMPT(extractedData.sessionType,extractedData.data,premarketContext),'',700);
      const cleanCoach = stripMarkdown(coachTxt);

      // Write Coaching Log with LOCAL interventionData (bug fix #4)
      setStatusMsg('Saving coaching log…');
      const clData={
        date:TODAY,
        session_type:extractedData.sessionType,
        readiness_score:interventionData?String(interventionData.score):'',
        emotional_state:extractedData.data.feeling_emotional_state||extractedData.data.nervous_system_state||extractedData.data.overall_emotional_state||'',
        coaching_response:cleanCoach,
        intervention_triggered:interventionData?(interventionData.score<=7?'Y':'N'):'N',
        intervention_type:interventionData&&interventionData.score<=7?'Pre-session readiness':'',
        daily_pattern_identified:extractedData.data.pattern_claude_identified||'',
        key_insight_today:'',
        weekly_summary:''
      };
      await writeTab(sid,'Coaching Log',TCH,TCK,clData);

      // Clean up
      setText('');
      setStatus('idle'); setStatusMsg('');

      // Show intervention first (with pending coaching attached), OR show coaching directly
      if(interventionData){
        setIntervention({text:interventionData.text,score:interventionData.score,pendingCoaching:cleanCoach});
      } else {
        setCoaching(cleanCoach);
      }
    } catch(e){setStatus('error');setStatusMsg(e.message);}
  };

  const proceedFromIntervention = function(){
    const pending = intervention ? intervention.pendingCoaching : null;
    setIntervention(null);
    if(pending) setCoaching(pending);
  };

  if(coaching) return h(CoachingDisplay,{text:coaching,onClose:function(){setCoaching(null);},onSpeak:function(){speak(coaching);},speaking:speaking});
  if(intervention) return h(InterventionScreen,{text:intervention.text,score:intervention.score,onProceed:proceedFromIntervention,onSpeak:function(){speak(intervention.text);},speaking:speaking});

  const btnBg = status==='saving'?'var(--bg3)':status==='error'?'linear-gradient(135deg,#8a3030,var(--red))':'linear-gradient(135deg,var(--amber-d),var(--amber))';
  const btnTxt = status==='saving'?(statusMsg||'SAVING...'):status==='error'?'⚠ ERROR — TAP TO RETRY':'EXTRACT & SAVE TO GOOGLE SHEETS →';

  return h('div',{className:'app-screen',style:{position:'relative',zIndex:1}},
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'13px 22px',borderBottom:'1px solid var(--border)',flexShrink:0,background:'var(--bg2)'}},
      h('span',{style:{color:'var(--amber)',fontFamily:'monospace',fontSize:14,letterSpacing:2,fontWeight:700}},'✦  AVKAR · JOURNAL'),
      h('button',{className:'btn-nav',onClick:props.onBack},'← Back')
    ),
    h('div',{style:{padding:'10px 22px',borderBottom:'1px solid var(--border)',flexShrink:0,display:'flex',alignItems:'center',gap:14,background:'var(--bg2)'}},
      h('span',{style:{background:'var(--bg3)',border:'1px solid var(--border2)',color:meta.color,fontFamily:'monospace',fontSize:11,padding:'4px 16px',borderRadius:20,letterSpacing:2,fontWeight:700}},meta.label),
      h('span',{style:{color:'var(--text3)',fontFamily:'monospace',fontSize:12}},meta.sub)
    ),
    h('button',{onClick:function(){setShowGuide(function(v){return !v;});},style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 22px',background:'var(--bg3)',border:'none',borderBottom:'1px solid var(--border)',color:'var(--text2)',fontFamily:'monospace',fontSize:14,fontWeight:700,flexShrink:0,width:'100%',textAlign:'left',letterSpacing:1}},
      h('span',null,'📋   '+(showGuide?'Hide':'Show')+' Speaking Guide'),
      h('span',{style:{opacity:.45,fontSize:12}},showGuide?'▲':'▼')
    ),
    status==='saving'&&h('div',{style:{padding:'7px 22px',background:'var(--bg3)',borderBottom:'1px solid var(--border)',color:'var(--amber)',fontFamily:'monospace',fontSize:11,letterSpacing:1,flexShrink:0}},statusMsg),
    status==='error'&&h('div',{style:{padding:'8px 22px',background:'rgba(224,120,120,.1)',borderBottom:'1px solid rgba(224,120,120,.3)',color:'var(--red)',fontFamily:'monospace',fontSize:11,flexShrink:0,lineHeight:1.5}},statusMsg),
    h('div',{style:{flex:1,display:'flex',overflow:'hidden',minHeight:0}},
      showGuide&&h(GuidePanel,{guide:guide}),
      h('div',{style:{flex:1,display:'flex',flexDirection:'column',padding:'14px 18px',overflow:'hidden'}},
        h('div',{style:{position:'relative',flex:1,display:'flex',flexDirection:'column',minHeight:0}},
          h('textarea',{value:text,onChange:function(ev){setText(ev.target.value);},placeholder:'Tap here → tap 🎤 mic on keyboard → speak freely about all topics in the guide…',style:{flex:1,height:'100%'}}),
          h('div',{style:{position:'absolute',top:14,right:14,fontSize:17,pointerEvents:'none',opacity:.25}},'🎤'),
          h('div',{style:{position:'absolute',bottom:11,right:14,color:'var(--text3)',fontFamily:'monospace',fontSize:12}},words+' words')
        )
      )
    ),
    h('div',{className:'submit-bar'},
      h('button',{onClick:status==='saving'?null:handleSave,disabled:status==='saving',style:{width:'100%',padding:'19px',background:btnBg,border:'none',color:status==='saving'?'var(--amber)':'#fff',fontFamily:'monospace',fontSize:14,fontWeight:900,letterSpacing:3,transition:'all .3s',display:'block'}},btnTxt)
    )
  );
}

    ),
    h('div',{style:{padding:'28px 22px',overflowY:'auto',flex:1}},
      h('div',{style:{borderLeft:'3px solid var(--amber-d)',paddingLeft:18,marginBottom:34,color:'var(--text2)',fontStyle:'italic',fontSize:16,lineHeight:1.8}},
        '"The undisciplined trader\'s biggest enemy is himself. The journal is the mirror."',
        h('div',{style:{color:'var(--text3)',fontFamily:'monospace',fontSize:12,marginTop:8,letterSpacing:1}},'— Mark Douglas')
      ),
      h('div',{style:{color:'var(--text1)',fontSize:23,fontWeight:700,marginBottom:7,letterSpacing:.5}},'What are you logging?'),
      h('div',{style:{color:'var(--amber)',fontFamily:'monospace',fontSize:12,letterSpacing:2,marginBottom:26}},'CHOOSE YOUR SESSION TYPE'),
      h('div',{style:{display:'flex',gap:16,flexWrap:'wrap',marginBottom:20}},
        sessions.map(function(s){return h('button',{key:s.id,onClick:function(){props.onSelect(s.id);},style:{flex:'1 1 170px',minHeight:124,background:'var(--bg2)',border:'1.5px solid var(--border2)',borderRadius:14,color:s.color,fontSize:17,fontWeight:700,letterSpacing:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:10,padding:20,fontFamily:'Georgia,serif',transition:'background .15s'}},
          h('span',{style:{fontSize:28}},s.icon),
          h('span',null,s.label),
          h('span',{style:{color:'var(--text3)',fontSize:12,fontFamily:'monospace',fontWeight:400,marginTop:2}},s.meta)
        );})
      ),
      IS_SUNDAY&&h('button',{onClick:props.onWeekly,style:{width:'100%',background:'linear-gradient(135deg,#2a1a4a,#3d2a6a)',border:'1px solid var(--purple)',borderRadius:14,color:'var(--purple)',fontSize:15,fontWeight:700,letterSpacing:2,padding:'18px 20px',fontFamily:'monospace',display:'flex',alignItems:'center',justifyContent:'center',gap:12}},
        h('span',{style:{fontSize:22}},'📊'),
        h('span',null,'SUNDAY RECALIBRATION')
      ),
      !IS_SUNDAY&&h('button',{onClick:props.onWeekly,style:{width:'100%',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:14,color:'var(--text3)',fontSize:13,fontWeight:700,letterSpacing:2,padding:'14px 20px',fontFamily:'monospace',display:'flex',alignItems:'center',justifyContent:'center',gap:10}},
        h('span',null,'📊  Weekly Analysis (Sunday)')
      )
    )
  );
}

/* ══ SPLASH ══════════════════════════════════════════════════════ */
function Splash(props){
  useViewportHeight();
  const quotes = props.quotes;
  const [idx,setIdx]=useState(0);
  const [fade,setFade]=useState(true);
  const [now,setNow]=useState(new Date());
  useEffect(function(){const t=setInterval(function(){setNow(new Date());},30000);return function(){clearInterval(t);};},[]);
  useEffect(function(){
    if(quotes.length<=1)return;
    const t=setInterval(function(){setFade(false);setTimeout(function(){setIdx(function(i){return (i+1)%quotes.length;});setFade(true);},400);},60000);
    return function(){clearInterval(t);};
  },[quotes.length]);
  const q=quotes[idx]||quotes[0];
  const ds=now.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
  const ts=now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  return h('div',{className:'app-screen',style:{alignItems:'center',justifyContent:'center',position:'relative',zIndex:1,padding:'40px 36px'}},
    h('div',{style:{fontFamily:'monospace',fontSize:12,letterSpacing:5,color:'var(--amber)',marginBottom:54,opacity:.9,display:'flex',alignItems:'center',gap:12}},
      h('span',{style:{fontSize:15}},'✦'),'AVKAR',h('span',{style:{opacity:.3}},'·'),'TRADING JOURNAL'
    ),
    h('div',{style:{textAlign:'center',maxWidth:580,marginBottom:60,transition:'opacity .4s',opacity:fade?1:0}},
      h('div',{style:{color:'var(--text1)',fontFamily:'Georgia,serif',fontSize:24,fontStyle:'italic',lineHeight:1.8,marginBottom:20}},'"'+q.text+'"'),
      q.author&&h('div',{style:{color:'var(--amber-d)',fontFamily:'monospace',fontSize:12,letterSpacing:3}},'— '+q.author.toUpperCase())
    ),
    h('button',{className:'btn-cta',onClick:props.onStart},'START JOURNAL SESSION'),
    h('div',{style:{display:'flex',gap:14,marginTop:22}},
      IS_SUNDAY&&h('button',{onClick:props.onStart,style:{background:'linear-gradient(135deg,#2a1a4a,#3d2a6a)',border:'1px solid var(--purple)',color:'var(--purple)',borderRadius:11,padding:'11px 22px',fontFamily:'monospace',fontSize:13,letterSpacing:1}},'📊 Sunday Analysis'),
      h('button',{onClick:props.onSettings,style:{background:'none',border:'1px solid var(--border2)',color:'var(--text3)',borderRadius:11,padding:'11px 22px',fontFamily:'monospace',fontSize:13,letterSpacing:1}},'⚙  Settings')
    ),
    h('div',{style:{position:'absolute',bottom:30,color:'var(--text3)',fontFamily:'monospace',fontSize:12,letterSpacing:2}},ds+' · '+ts)
  );
}

/* ══ APP ═════════════════════════════════════════════════════════ */
function App(){
  useViewportHeight();
  const [screen,setScreen]=useState('splash');
  const [session,setSession]=useState(null);
  const [showSettings,setShowSettings]=useState(false);
  useEffect(function(){if(!lget('ak','')||!lget('sid',''))setShowSettings(true);},[]);
  return h('div',{style:{height:'var(--app-h)',background:'var(--bg)',overflow:'hidden'}},
    h(Stars),
    showSettings&&h(SettingsModal,{onClose:function(){setShowSettings(false);}}),
    screen==='splash'&&h(Splash,{quotes:ALL_QUOTES,onStart:function(){setScreen('select');},onSettings:function(){setShowSettings(true);}}),
    screen==='select'&&h(SessionSelector,{onSelect:function(s){setSession(s);setScreen('journal');},onHome:function(){setScreen('splash');},onWeekly:function(){setScreen('weekly');}}),
    screen==='journal'&&h(JournalScreen,{session:session,onBack:function(){setScreen('select');}}),
    screen==='weekly'&&h(WeeklyScreen,{onBack:function(){setScreen('select');}})
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
